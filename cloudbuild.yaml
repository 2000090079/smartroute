# Cloud Build CI/CD pipeline for SmartRoute.
#
# Trigger this from a Cloud Build trigger watching the `main` branch:
#   gcloud builds triggers create github \
#     --name=smartroute-main-deploy \
#     --repo-name=smartroute \
#     --repo-owner=2000090079 \
#     --branch-pattern='^main$' \
#     --build-config=cloudbuild.yaml \
#     --region=us-central1
#
# Substitutions with a leading underscore have defaults below and can be
# overridden per-trigger in the Cloud Console or with --substitutions.
substitutions:
  _REGION: us-central1
  _REPOSITORY: smartroute
  _SERVICE: smartroute-backend
  _SERVICE_ACCOUNT: smartroute-run-sa

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${SHORT_SHA}'

steps:
  # 1. Build the backend image (Dockerfile builds from repo root, COPY backend/).
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:latest'
      - '-f'
      - Dockerfile
      - .

  # 2. Push both tags to Artifact Registry.
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}'
    waitFor:
      - build

  # 3. Deploy the new image to Cloud Run. Secrets are re-attached from
  #    Secret Manager on every deploy (see gcp/secret-manager-setup.sh) so
  #    this step never contains plaintext credentials.
  - id: deploy
    name: gcr.io/google-cloud-sdk/slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '${_SERVICE}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--service-account=${_SERVICE_ACCOUNT}@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--port=8080'
      - '--allow-unauthenticated'
      - '--set-secrets=OPENAI_API_KEY=OPENAI_API_KEY:latest,MONGO_URI=MONGODB_URI:latest,JWT_SECRET=JWT_SECRET:latest'
      - '--set-env-vars=OPENAI_MODEL=gpt-4o,MONGO_DB_NAME=smartroute,CONFIDENCE_THRESHOLD=0.7'
      - '--quiet'
    waitFor:
      - push

timeout: 1200s
