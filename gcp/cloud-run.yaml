# Cloud Run service manifest for SmartRoute's backend, in Knative Serving
# format. Apply declaratively with:
#
#   gcloud run services replace gcp/cloud-run.yaml \
#     --region=us-central1 \
#     --project=YOUR_PROJECT_ID
#
# Substitute YOUR_PROJECT_ID below (or `envsubst < gcp/cloud-run.yaml | \
# gcloud run services replace - --region=us-central1` after
# `export PROJECT_ID=your-project-id`). The image tag is managed by
# cloudbuild.yaml on every deploy; the `latest` tag here is only the
# bootstrap value for the very first `services replace`.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: smartroute-backend
  labels:
    app: smartroute
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      labels:
        app: smartroute
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      serviceAccountName: smartroute-run-sa@${PROJECT_ID}.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: us-central1-docker.pkg.dev/${PROJECT_ID}/smartroute/smartroute-backend:latest
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
            requests:
              memory: 512Mi
              cpu: "1"
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 0
            timeoutSeconds: 3
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            timeoutSeconds: 3
            periodSeconds: 30
            failureThreshold: 3
          env:
            - name: OPENAI_MODEL
              value: gpt-4o
            - name: MONGO_DB_NAME
              value: smartroute
            - name: CONFIDENCE_THRESHOLD
              value: "0.7"
            - name: CORS_ORIGINS
              value: https://smartroute-frontend.web.app
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: OPENAI_API_KEY
                  key: latest
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: MONGODB_URI
                  key: latest
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: JWT_SECRET
                  key: latest
  traffic:
    - percent: 100
      latestRevision: true
